<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: maroon;
        }

    </style>
    <script>
        function OrderClick(){

             var mealName="";
            var adonName="";
             var mealCost= 0;
            var  adonCost= 0;

            document.getElementById("lblName").innerHTML=document.getElementById("txtName").value;
            document.getElementById("lblMobile").innerHTML=document.getElementById("txtMobile").value;
        
            
           

            var burgerRadio = document.getElementById("optBurger");
            var rollerRadio = document.getElementById("optRoller");
            
            var wingsCheckbox = document.getElementById("optWings");
            var krusherCheckbox=document.getElementById("optKrusher");

            
            
            if(burgerRadio.checked){
                
                mealName = burgerRadio.value;
                mealCost=120;
                
            }
           
            if(rollerRadio.checked){
                
                mealName=rollerRadio.value;
                mealCost=100;
            
            }

           if(krusherCheckbox.checked){
                adonName+=krusherCheckbox.value +"<br>";
                adonCost=60;
                mealCost+= adonCost;
            }
            if(wingsCheckbox.checked){
                adonName+=wingsCheckbox.value + "<br>"
                adonCost = 80;
                mealCost+=adonCost;
            }
            document.getElementById("lblMeal").innerHTML= mealName;
            document.getElementById("lblAdon").innerHTML=adonName;
            document.getElementById("lblAmount").innerHTML= "&#8377; " +mealCost;
        }
        
    
    </script>
</head>
<body class="container-fluid">
    <header>
        <img src="./kfc.png"width="100%"height="200px">
    </header>
    <section>
        <div class="accordion"id="Kfc">
        <div class="accordion-item">
            <div class="accordion-header">
                <button class="btn btn-danger w-100" data-bs-target="#customer"data-bs-toggle="collapse">
                    <h3>Customer Details</h3>
               </button>
            </div>
           
            <div class="accordion-body accordion-collapse collapse show"id="customer"data-bs-parent="#kfc">
                      <dl>
                        <dt>Customer Name</dt>
                        <dd><input type="text" class="form-control"id="txtName"></dd>
                        <dt>Mobile Number</dt>
                        <dd><input type="number"class="form-control"id="txtMobile"></dd>
                    </dl>
                </div>
             </div>
        
        <div class="accordion-item">
            <div class="accordion-header">
                <button class="btn btn-danger w-100" data-bs-target="#meal"data-bs-toggle="collapse">
                 <h3> Select Meal</h3>
                  </button>
            </div>

            <div class="accordion-body accordion-collapse collapse "id="meal" data-bs-parent="#kfc">
            <div class="row">
                <div class="col text-center">
                    <img src="./foodkfc.png"width="200" height="200">
                    <div>
                    <input type="radio"name="meal"value="OMG Burger"id="optBurger"class="form-check-input">OMG Burger [&#8377; 120/-]
                    </div>
                    </div>

                    <div class="col text-center">
                        <img src="./foodkfc.png"width="200"height="200">
                    <div>
                        <input type="radio" name="meal"value="OMG Roller"id="optRoller"class="form-check-input">OMG Roller [&#8377; 100/-]
                      </div>
                    </div>
                   </div>
                   </div>
                   

                   <div class="accordion-item">
                    <div class="accordion-header">
                        <button class="btn btn-danger w-100"data-bs-target="#adon" data-bs-toggle="collapse">
                            <h3>Select Ad-ON's</h3>
                        </button>
                        </div>
                        <div class="accordion-body accordion-collapse collapse" id="adon"data-bs-parent="#Kfc">
                            <div class="row">
                                <div class="col">
                                    <img src="./kfc.png"width="200"height="200">
                                    <div>
                                        <input type="checkbox"value="Krusher Brownie"id="optKrusher"class="form-check-input">
                                        Krusher Brownie [&#8377; 60/-]
                                    </div>
                                </div>
                                <div class="col text-center">
                                    <img src="./foodkfc.png"width="200"height="200">
                                    <div>
                                    <input type="checkbox"value="Krusher Brownie"id="optWings"class="form-check-input">
                                    Hot Wings [&#8377; 80/-]
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col">
            <button onclick="OrderClick()" class="btn btn-danger w-100" data-bs-target="#billSummary"data-bs-toggle="modal">
                                    <h3>Place Order</h3>
                                </button>
                            </div>
                        
            <div class="modal fade"id="billSummary">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Your Order Bill Summary</h3>
                        <button  class="btn-close"data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                           <dl class="row">
                                    <dt class="col-4">Customer Name</dt>
                                    <dd  class="col-8" id="lblName"></dd>
                                    <dt class="col-4">Mobile Number</dt>
                                    <dd  class="col-8" id="lblMobile"></dd>
                                    <dt class="col-4">Meal Name</dt>
                                    <dd  class="col-8" id="lblMeal"></dd>
                                    <dt class="col-4">Ad-On's</dt>
                                    <dd class="col-8" id="lblAdon"></dd>
                                    <dt class="col-4">Total Amount</dt>
                                    <dd  class="col-8" id="lblAmount"></dd>
                                </dl>
                            </div>
                         <div class="modal-footer">
                        <button class="btn btn-primary"data-bs-dismiss="modal">Ok</button>

                            </div>
                            </div>
                            </div>
                            </div>
                            </div>
                        
                    </div>
                </div>
            </div>
        </div>
        
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
